# .github/workflows/android-ui-tests.yml

name: Android UI Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  android-ui-tests:
    runs-on: ubuntu-latest

    env:
      APPIUM_SERVER_URL: http://127.0.0.1:4723
      APK_PATH: app/app-debug.apk
      DEVICE_NAME: emulator-5554
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules

          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium driver list --installed

      - name: Start Appium server
        run: |
          appium --base-path / --log-level info > appium.log 2>&1 &
          sleep 10

      - name: Run tests on Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save
          disable-animations: true

          script: |
            adb devices

            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Waiting for Android boot completion..."
            timeout 120 bash -c 'until [[ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" == "1" ]]; do echo "Booting..."; sleep 5; done'

            echo "Unlocking screen..."
            adb shell input keyevent 82 || true

            echo "Device info:"
            adb shell wm size
            adb shell wm density

            echo "Running tests..."
            pytest \
              --alluredir=allure-results \
              --clean-alluredir

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
          if-no-files-found: ignore

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore